{% extends "base.html" %}

{% block title %}Week of {{ week_start.strftime('%d %b') }} — Lifeblock{% endblock %}

{% block content %}
<div class="week-layout">

    <!-- LEFT SIDEBAR: Toggles & Quick Add -->
    <aside class="week-sidebar">
        <h3>This Week</h3>

        <div class="week-nav">
            <a href="/week/{{ (week_start - timedelta(days=7)).isoformat() }}" class="btn btn-sm">&larr; Prev</a>
            <a href="/" class="btn btn-sm">Today</a>
            <a href="/week/{{ (week_start + timedelta(days=7)).isoformat() }}" class="btn btn-sm">Next &rarr;</a>
        </div>

        <!-- Weekly toggles -->
        <div class="toggles-section">
            <h4>Weekly Decisions</h4>
            <div id="toggles-container">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Quick add block -->
        <!-- Quick add removed — use click-drag on calendar -->

        <!-- Weather strip -->
        <div class="weather-section">
            <h4>Weather This Week</h4>
            <div id="weather-strip">
                <p class="muted">Loading...</p>
            </div>
        </div>

        <!-- 48h rain -->
        <div class="rain-chart-section">
            <h4>Rain — Next 48 Hours</h4>
            <div id="rain-chart">
                <p class="muted">Loading...</p>
            </div>
        </div>
    </aside>

    <!-- MAIN: Calendar + Bottom Panel -->
    <div class="week-main">
        <div id="calendar"></div>

        <!-- Insights Panel -->
        <div class="insights-panel">
            <div class="insights-header">
                <select id="insights-select">
                    <option value="running">Running</option>
                    <option value="food">Food Shopping</option>
                    <option value="habits">Habits</option>
                </select>
            </div>
            <div id="insights-content">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    const WEEK_START = '{{ week_start.isoformat() }}';

    document.addEventListener('DOMContentLoaded', function() {
        initWeekView(WEEK_START);

        // Check every 60s if the week has changed (midnight crossing)
        let lastCheckedDay = new Date().toISOString().slice(0, 10);
        setInterval(() => {
            const today = new Date();
            const todayStr = today.toISOString().slice(0, 10);
            if (todayStr !== lastCheckedDay) {
                lastCheckedDay = todayStr;
                // Calculate current week's Monday
                const day = today.getDay();
                const diff = day === 0 ? 6 : day - 1; // Monday = 0 offset
                const monday = new Date(today);
                monday.setDate(today.getDate() - diff);
                const mondayStr = monday.toISOString().slice(0, 10);
                if (mondayStr !== WEEK_START) {
                    // Week changed — redirect to current week
                    window.location.href = '/week/' + mondayStr;
                } else {
                    // Same week, just refetch events to update "today" column highlighting
                    if (typeof calendar !== 'undefined' && calendar) calendar.refetchEvents();
                }
            }
        }, 60 * 1000);
    });
</script>
{% endblock %}
