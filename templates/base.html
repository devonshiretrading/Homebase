<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeblock</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-brand">Lifeblock</a>
        <div class="nav-links">
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div id="water-gate" class="gate-overlay" style="display: none;">
        <div class="gate-content">
            <div class="gate-icon">💧</div>
            <h2>Drink some water</h2>
            <p>Take a sip before you continue</p>
            <button onclick="dismissGate('water')" class="gate-btn">Done — I drank some</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
